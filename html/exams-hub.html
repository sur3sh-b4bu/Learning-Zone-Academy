        const CUSTOM_EXAM_KEY = '__CUSTOM_SUBJECT__';
        let currentExam = 'TNPSC';
        let currentTab = 'notifications';

        function normalizeExamKey(value) {
            return String(value || '').trim().toLowerCase();
        }

        function cleanText(value) {
            return String(value || '').trim();
        }

        function stripHtml(value) {
            const div = document.createElement('div');
            div.innerHTML = String(value || '');
            return cleanText(div.textContent || div.innerText || '');
        }

        function splitToList(value) {
            const text = cleanText(value);
            if (!text) return [];
            return text
                .split(/\r?\n|,|;/)
                .map(item => cleanText(item))
                .filter(Boolean);
        }

        function formatFirestoreDate(ts) {
            if (!ts) return 'Recent';
            try {
                const d = ts.toDate ? ts.toDate() : new Date(ts);
                if (Number.isNaN(d.getTime())) return 'Recent';
                return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch (_) {
                return 'Recent';
            }
        }

        function buildDynamicExamData(subject) {
            const name = cleanText(subject.name) || 'Exam Details';
            const examType = cleanText(subject.category) || 'General';
            const pattern = cleanText(subject.pattern);
            const eligibilityList = splitToList(subject.eligibility);
            const syllabusText = stripHtml(subject.syllabus);
            const syllabusLines = splitToList(syllabusText);
            const updatedLabel = formatFirestoreDate(subject.updatedAt || subject.createdAt);
            const descriptionSource = syllabusText || pattern || `${name} preparation details.`;
            const description = descriptionSource.length > 180 ? `${descriptionSource.slice(0, 180)}...` : descriptionSource;

            return {
                fullName: name,
                description,
                queryValue: name,
                notifications: [
                    { title: `${name} details updated`, date: `Type: ${examType}`, status: 'Info' },
                    { title: pattern || 'Pattern details available in syllabus tab', date: `Updated: ${updatedLabel}`, status: 'Update' }
                ],
                eligibility: eligibilityList.length ? eligibilityList : ['Eligibility details will be updated soon.'],
                dates: [
                    { event: 'Exam Type', date: examType },
                    { event: 'Last Updated', date: updatedLabel }
                ],
                syllabus: [
                    {
                        subject: examType,
                        marks: pattern || 'As notified',
                        topics: syllabusLines.length ? syllabusLines.join(', ') : (syllabusText || 'Syllabus will be updated soon.')
                    }
                ],
                cutoff: {
                    Status: 'Will be updated'
                }
            };
        }

        async function getSubjectFromQuery(urlParams) {
            const subjectId = cleanText(urlParams.get('subject'));
            const subjectName = cleanText(urlParams.get('cat'));

            if (!subjectId && !subjectName) return null;

            try {
                if (subjectId) {
                    const doc = await db.collection('subjects').doc(subjectId).get();
                    if (doc.exists) return { id: doc.id, ...doc.data() };
                }

                if (subjectName && !Object.keys(examData).some(k => normalizeExamKey(k) === normalizeExamKey(subjectName))) {
                    const snap = await db.collection('subjects').orderBy('name').get();
                    const match = snap.docs.find(d => normalizeExamKey(d.data().name) === normalizeExamKey(subjectName));
                    if (match) return { id: match.id, ...match.data() };
                }
            } catch (e) {
                console.warn('Could not fetch subject detail from Firestore:', e);
            }

            return null;
        }

        function setActiveExamButton(examKey) {
            document.querySelectorAll('.exam-btn').forEach(btn => {
                const btnLabel = cleanText(btn.textContent);
                btn.classList.toggle('active', normalizeExamKey(btnLabel) === normalizeExamKey(examKey));
            });
        }



        function switchTab(tab, evt) {
            currentTab = tab;

            // Update active tab
            document.querySelectorAll('.exam-tab').forEach(t => t.classList.remove('active'));
            evt.target.classList.add('active');

            // Render content
            renderExamContent(currentExam, tab);
        }

        function renderExamContent(exam, tab) {
            const data = examData[exam] || examData.TNPSC;
            const contentDiv = document.getElementById('exam-content');
            const notifications = Array.isArray(data.notifications) && data.notifications.length
                ? data.notifications
                : [{ title: 'No notifications available right now', date: 'Updated soon', status: 'Info' }];
            const eligibility = Array.isArray(data.eligibility) && data.eligibility.length
                ? data.eligibility
                : ['Eligibility details will be updated soon.'];
            const dates = Array.isArray(data.dates) && data.dates.length
                ? data.dates
                : [{ event: 'Important dates', date: 'To be announced' }];
            const syllabus = Array.isArray(data.syllabus) && data.syllabus.length
                ? data.syllabus
                : [{ subject: 'General', marks: 'As notified', topics: 'Detailed syllabus will be updated soon.' }];
            const cutoff = data.cutoff && typeof data.cutoff === 'object' && Object.keys(data.cutoff).length
                ? data.cutoff
                : { Status: 'Will be updated' };

            let html = `<h2 class="mb-32" style="font-size: 2.2rem; color: var(--secondary); font-weight: 700; letter-spacing: -1px;">${data.fullName}</h2>`;

            if (tab === 'notifications') {
                html += '<div class="info-grid">';
                notifications.forEach(notif => {
                    html += `<div class="info-card"><h3>${notif.title}</h3><p style="font-size: 0.9rem; color: var(--primary); font-weight: 600;">${notif.date}</p></div>`;
                });
                html += '</div>';
            } else if (tab === 'eligibility') {
                html += '<div class="info-card" style="border-left: 5px solid var(--primary);"><ul style="list-style: none; padding: 0;">';
                eligibility.forEach(item => {
                    html += `<li style="padding: 12px 0; display: flex; align-items: flex-start; gap: 12px;"><span style="color: var(--primary); font-weight: 700; flex-shrink: 0;">&#8226;</span><span>${item}</span></li>`;
                });
                html += '</ul></div>';
            } else if (tab === 'dates') {
                html += '<div class="timeline">';
                dates.forEach(item => {
                    html += `<div class="timeline-item"><div class="timeline-date">${item.date}</div><div class="timeline-content"><h4>${item.event}</h4></div></div>`;
                });
                html += '</div>';
            } else if (tab === 'syllabus') {
                html += '<table class="syllabus-table"><thead><tr><th>Subject</th><th>Marks</th><th>Topics</th></tr></thead><tbody>';
                syllabus.forEach(item => {
                    html += `<tr><td style="font-weight: 600;">${item.subject}</td><td>${item.marks}</td><td>${item.topics}</td></tr>`;
                });
                html += '</tbody></table>';
            } else if (tab === 'cutoff') {
                html += '<div class="info-grid">';
                Object.entries(cutoff).forEach(([category, marks]) => {
                    html += `<div class="info-card"><h3>${category} Category</h3><p style="font-size: 1.8rem; color: var(--primary); font-weight: 700; margin: 12px 0;">${marks}</p><p style="font-size: 0.9rem;">Previous Year Cut-off</p></div>`;
                });
                html += '</div>';
            }

            const examQuery = encodeURIComponent(data.queryValue || exam);
            html += `
            <div class="cta-section" style="margin-top: 60px;">
                <h2>Start Your Success Journey</h2>
                <p>Download syllabus PDF, access 50+ free mock tests, and get expert-guided materials for ${data.fullName}</p>
                <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                    <a href="mock-tests.html?exam=${examQuery}" class="btn-glass">
                        <i class="fas fa-file-alt"></i> <span>Free Mock Tests</span>
                    </a>
                    <a href="materials.html?exam=${examQuery}" class="btn-glass">
                        <i class="fas fa-download"></i> <span>Study Materials</span>
                    </a>
                </div>
            </div>`;

            contentDiv.innerHTML = html;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const requestedCat = cleanText(urlParams.get('cat'));
            const requestedSubjectId = cleanText(urlParams.get('subject'));

            // 1. Fetch all subjects from Firestore to build dynamic selector
            try {
                const snap = await db.collection('subjects').orderBy('name').get();
                const selector = document.getElementById('exam-selector');
                if (selector && snap.docs.length > 0) {
                    selector.innerHTML = ''; // Clear static buttons
                    snap.docs.forEach(doc => {
                        const s = doc.data();
                        const name = cleanText(s.name);
                        const btn = document.createElement('button');
                        btn.className = 'exam-btn';
                        btn.textContent = name;
                        btn.onclick = (e) => switchExam(name, e, doc.id);
                        selector.appendChild(btn);
                    });
                }
            } catch (e) {
                console.warn('Failed to load dynamic exam categories:', e);
            }

            const subjectFromAdmin = await getSubjectFromQuery(urlParams);

            if (subjectFromAdmin) {
                examData[CUSTOM_EXAM_KEY] = buildDynamicExamData(subjectFromAdmin);
                currentExam = CUSTOM_EXAM_KEY;
                currentTab = 'notifications';
                renderExamContent(currentExam, currentTab);

                // Highlight corresponding button if exists
                setActiveExamButton(subjectFromAdmin.name);
                return;
            }

            const staticExamKey = Object.keys(examData).find(key => normalizeExamKey(key) === normalizeExamKey(requestedCat));
            currentExam = staticExamKey || 'TNPSC';
            currentTab = 'notifications';
            renderExamContent(currentExam, currentTab);
            setActiveExamButton(currentExam);
        });

        // Update switchExam to support Firestore subjects
        async function switchExam(examName, evt, subjectId = null) {
            currentExam = examName;
            currentTab = 'notifications';

            // Check if it's a known static exam or needs fetching from Firestore
            const staticKey = Object.keys(examData).find(k => normalizeExamKey(k) === normalizeExamKey(examName));
            if (staticKey) {
                currentExam = staticKey;
            } else if (subjectId) {
                try {
                    const doc = await db.collection('subjects').doc(subjectId).get();
                    if (doc.exists) {
                        examData[CUSTOM_EXAM_KEY] = buildDynamicExamData({ id: doc.id, ...doc.data() });
                        currentExam = CUSTOM_EXAM_KEY;
                    }
                } catch (e) { console.error('Error switching to dynamic exam:', e); }
            }

            // Update active button
            document.querySelectorAll('.exam-btn').forEach(btn => btn.classList.remove('active'));
            if (evt && evt.target) evt.target.classList.add('active');

            // Render content for first tab
            renderExamContent(currentExam, 'notifications');
        }
    </script>
