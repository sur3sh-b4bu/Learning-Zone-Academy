<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Learning | NellaiLearningAcademy - Classes & Doubt Clearing</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/videos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav id="main-nav"></nav>

    <header class="hero" style="padding: 140px 0 80px; position: relative; overflow: hidden;">
        <div class="div-glow hero-glow-pulse"
            style="position: absolute; top: -100px; left: 50%; width: 600px; height: 300px; background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%); filter: blur(60px); z-index: -1;">
        </div>
        <div class="container text-center" style="position: relative; z-index: 10;">
            <h1 class="hero-title"
                style="font-size: 3.5rem; font-weight: 700; margin-bottom: 20px; line-height: 1.2; color: var(--secondary); opacity: 0; animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                Premium <span>Video Classes</span></h1>
        </div>
    </header>

    <div class="container" style="margin-top: -40px; position: relative; z-index: 20;">
        <div class="premium-lead text-center fade-in" style="margin-bottom: 24px;">
            <p
                style="font-size: 1.05rem; color: var(--text-muted); line-height: 1.6; max-width: 800px; margin: 0 auto; text-align: center; animation: reveal-lead 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                Learn from top-tier educators with recorded sessions and live doubt solving.
            </p>
        </div>
    </div>

    <section class="subjects-section" style="min-height: 600px; padding: 60px 0;">
        <div class="container">
            <!-- Filter Toggle Button -->
            <div style="text-align: center; margin-bottom: 30px;">
                <button type="button" class="filter-toggle-btn" onclick="toggleVideoFilters()">Show Filters</button>
            </div>

            <!-- Video Categories -->
            <div class="mat-tabs fade-in" id="video-tabs-container" style="margin-bottom: 50px;">
                <div class="mat-tab active" onclick="filterVideos('all', this)">All Classes</div>
                <div class="mat-tab" onclick="filterVideos('recorded', this)">Recorded Sessions</div>
                <div class="mat-tab" onclick="filterVideos('live', this)">Live Classes</div>
                <div class="mat-tab" onclick="filterVideos('doubt', this)">Doubt Solving</div>
            </div>

            <div class="search-wrapper fade-in"
                style="margin-bottom: 60px; position:relative; z-index:10; max-width: 600px; margin-left: auto; margin-right: auto;">
                <div class="search-container"
                    style="display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 99px; padding: 0 28px; transition: all 0.3s;">
                    <i class="fas fa-video" style="color: var(--primary); font-size: 1.1rem; margin-right: 16px;"></i>
                    <input type="text" id="videos-search" placeholder="Search for courses or topics..."
                        style="width: 100%; height: 64px; border: none; background: transparent; color: var(--secondary); font-size: 1.05rem; outline: none;">
                </div>
            </div>

            <div id="videos-container">
                <div id="videos-loading" style="text-align: center; padding: 60px 20px;">
                    <div
                        style="display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(16, 185, 129, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
                    </div>
                    <p style="color: rgba(255, 255, 255, 0.8); margin-top: 16px; font-weight: 600;">Fetching video
                        library...
                    </p>
                </div>
            </div>
        </div>
    </section>

    <footer id="main-footer"></footer>

    <!-- Modals same as before... -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/mock-data.js"></script>
    <script src="../js/components-loader.js"></script>
    <script src="../js/main.js"></script>

    <script>
        let currentVideoFilter = 'all';
        let videoCache = null;

        function filterVideos(cat, btn) {
            currentVideoFilter = cat;
            document.querySelectorAll('.mat-tab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderVideos(document.getElementById('videos-search').value);
        }

        async function renderVideos(filterText = '') {
            const container = document.getElementById('videos-container');
            if (!container) return;

            try {
                if (!videoCache) {
                    const snap = await db.collection('videos').orderBy('createdAt', 'desc').get();
                    videoCache = [];
                    snap.forEach(doc => {
                        videoCache.push({ id: doc.id, ...doc.data() });
                    });
                }

                if (videoCache.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding: 60px 20px;"><h3>No video courses found</h3></div>`;
                    return;
                }

                container.innerHTML = '';
                const grid = document.createElement('div');
                grid.className = 'grid-3';

                let count = 0;
                videoCache.forEach((course) => {
                    const title = course.title || '';
                    const subject = course.subject || '';
                    const matchesSearch = title.toLowerCase().includes(filterText.toLowerCase()) ||
                        subject.toLowerCase().includes(filterText.toLowerCase());

                    let typeFilterMatch = true;
                    if (currentVideoFilter !== 'all') {
                        typeFilterMatch = course.videoType === currentVideoFilter;
                    }

                    if (matchesSearch && typeFilterMatch) {
                        const delay = count * 0.1;
                        const requiredPlan = String(course.requiredPlan || 'free').toLowerCase();
                        const isLockedPlan = requiredPlan !== 'free';
                        const courseUrl = `video-view.html?course=${encodeURIComponent(course.id)}`;
                        const safeCourseUrl = courseUrl.replace(/'/g, "\\'");

                        const card = document.createElement('div');
                        card.className = 'video-card hover-3d';
                        card.style.animationDelay = `${delay}s`;

                        const isLive = course.videoType === 'live';
                        const liveBadge = isLive ? `<div class="live-indicator"><div class="live-dot"></div> LIVE</div>` : '';
                        const typeTag = (course.videoType || 'Record').toUpperCase();
                        const planTag = isLockedPlan
                            ? `<span class="video-tag-pill" style="background: rgba(16,185,129,0.14); color: #0f766e; border: 1px solid rgba(16,185,129,0.35);">${requiredPlan.toUpperCase()}+</span>`
                            : `<span class="video-tag-pill" style="background: rgba(148,163,184,0.18); color: #475569; border: 1px solid rgba(148,163,184,0.25);">FREE</span>`;
                        const actionAttrs = isLockedPlan
                            ? `href="#" onclick="return handlePlanLockedAsset(event, '${safeCourseUrl}', '${requiredPlan}', 'video')"`
                            : `href="${courseUrl}"`;
                        const actionText = isLockedPlan ? `Unlock ${requiredPlan.toUpperCase()}` : 'Continue Learning';

                        card.innerHTML = `
                            <div class="video-thumbnail">
                                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&h=250&fit=crop" alt="${title}" loading="lazy">
                                <div class="play-overlay">
                                    <div class="play-icon"><i class="fas fa-play"></i></div>
                                </div>
                                <div class="video-duration">${typeTag}</div>
                                ${liveBadge}
                            </div>
                            <div class="video-info">
                                <div style="margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                                    <span class="video-tag-pill">${subject}</span>
                                    ${planTag}
                                </div>
                                <h3 class="video-title">${title}</h3>
                                <div class="video-meta-stats">
                                    <span><i class="fas fa-users"></i> 1.2k</span>
                                    <span><i class="fas fa-star"></i> 4.8</span>
                                    <span><i class="fas fa-clock"></i> 12h+</span>
                                </div>
                                <a ${actionAttrs} class="video-watch-btn">
                                    <span>${actionText}</span>
                                    <i class="fas fa-chevron-right"></i>
                                </a>
                            </div>
                        `;
                        grid.appendChild(card);
                        count++;
                    }
                });

                if (count === 0) {
                    container.innerHTML = `<div style="text-align:center; padding: 60px 20px;"><h3>No courses matched your search</h3></div>`;
                } else {
                    container.appendChild(grid);
                }
            } catch (err) {
                container.innerHTML = `<div style="text-align:center; padding: 60px 20px; color: rgba(255, 255, 255, 0.8);"><h3>Error loading courses: ${err.message}</h3></div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderVideos();
            document.getElementById('videos-search').addEventListener('input', (e) => renderVideos(e.target.value));
        });

        function toggleVideoFilters() {
            const tabsContainer = document.getElementById('video-tabs-container');
            const button = event.target;
            if (tabsContainer.classList.contains('active')) {
                tabsContainer.classList.remove('active');
                button.textContent = 'Show Filters';
            } else {
                tabsContainer.classList.add('active');
                button.textContent = 'Hide Filters';
            }
        }
    </script>
</body>

</html>
