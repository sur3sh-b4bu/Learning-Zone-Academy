<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test Session | Gov Learn</title>
    <meta name="description"
        content="Interactive mock test session. Take the challenge and track your progress in real-time.">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/test-view.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav id="session-nav"
        style="height: 72px; position: fixed; top: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border-glass); z-index: 1001;">
        <div class="container nav-content"
            style="height: 100%; display: flex; justify-content: space-between; align-items: center;">
            <a href="../index.html" class="logo"
                style="text-decoration: none; font-size: 1.6rem; font-weight: 700; color: var(--secondary);">Gov<span
                    style="color: var(--primary);">Learn</span></a>
            <div style="display: flex; align-items: center; gap: 24px;">
                <span id="subject-label"
                    style="font-weight: 700; color: var(--secondary); font-size: 1.1rem; letter-spacing: 0.5px;">Loading
                    Title...</span>
                <button type="button" class="btn-primary"
                    style="background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 10px 24px; border-radius: 12px; font-weight: 700; cursor: pointer;"
                    onclick="if(confirm('Quit the test session? Progress will be lost.')) location.href='mock-tests.html'">End
                    Test</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="test-layout">
            <div class="question-area fade-in">
                <div class="question-header">
                    <span id="q-header-text"
                        style="font-weight: 700; color: var(--primary-green); text-transform: uppercase; letter-spacing: 1px;">Loading...</span>
                    <span id="question-points" style="color: rgba(255, 255, 255, 0.8);">Points: +1 / -0.25</span>
                </div>

                <div class="question-text" id="q-text">
                    Fetching questions, please wait...
                </div>

                <div class="options-list" id="options-container">
                    <!-- Options injected via JS -->
                </div>

                <div class="action-footer">
                    <button class="btn-primary"
                        style="background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--border-glass);"
                        onclick="prevQuestion()">Previous</button>
                    <div style="display: flex; gap: 16px;">
                        <button class="btn-primary"
                            style="background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3);"
                            onclick="markForReview()">Mark for
                            Review</button>
                        <button class="btn-primary" onclick="nextQuestion()">Save & Next</button>
                    </div>
                </div>
            </div>

            <div class="sidebar-area fade-in">
                <div class="progress-container">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span
                            style="font-weight: 700; color: var(--secondary); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">Completion</span>
                        <span id="progress-text" style="font-size: 0.95rem; font-weight: 700; color: var(--primary);">0
                            / 0 Answered</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="timer-display" id="clock">
                    --:--
                </div>

                <div>
                    <h4
                        style="margin-bottom: 24px; color: var(--secondary); font-weight: 700; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-th-large" style="color: var(--primary);"></i> Question Navigator
                    </h4>
                    <div class="question-nav" id="q-nav-container">
                        <!-- Navigator injected via JS -->
                    </div>
                </div>

                <button type="button" class="btn-primary" style="width: 100%; margin-top: auto; padding: 16px;"
                    onclick="submitTest()">Submit Mock Test</button>
            </div>
        </div>
    </div>

    <!-- Result Overlay -->
    <div id="result-overlay"
        style="display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(24px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;">
        <div class="card glass"
            style="width: 100%; max-width: 800px; padding: 60px; border-radius: 40px; border: 1px solid var(--border-glass); text-align: center; animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);">
            <div
                style="width: 120px; height: 120px; background: var(--grad-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; margin: 0 auto 32px; box-shadow: var(--glow-primary);">
                <i class="fas fa-check-circle"></i>
            </div>

            <h1 style="font-size: 2.5rem; margin-bottom: 8px;">Test Submitted!</h1>
            <p style="color: var(--text-muted); margin-bottom: 48px;">Great job completing the session. Here is your
                performance overview.</p>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 24px; margin-bottom: 48px;">
                <div
                    style="background: rgba(255, 255, 255, 0.03); padding: 24px; border-radius: 24px; border: 1px solid var(--border-glass);">
                    <h4
                        style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">
                        Total Score</h4>
                    <p id="res-score" style="font-size: 2rem; font-weight: 700; color: var(--primary);">0.0</p>
                </div>
                <div
                    style="background: rgba(255, 255, 255, 0.03); padding: 24px; border-radius: 24px; border: 1px solid var(--border-glass);">
                    <h4
                        style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">
                        Correct</h4>
                    <p id="res-correct" style="font-size: 2rem; font-weight: 700; color: #22c55e;">0</p>
                </div>
                <div
                    style="background: rgba(255, 255, 255, 0.03); padding: 24px; border-radius: 24px; border: 1px solid var(--border-glass);">
                    <h4
                        style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">
                        Wrong</h4>
                    <p id="res-wrong" style="font-size: 2rem; font-weight: 700; color: #ef4444;">0</p>
                </div>
                <div
                    style="background: rgba(255, 255, 255, 0.03); padding: 24px; border-radius: 24px; border: 1px solid var(--border-glass);">
                    <h4
                        style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">
                        Accuracy</h4>
                    <p id="res-accuracy" style="font-size: 2rem; font-weight: 700; color: #3b82f6;">0%</p>
                </div>
            </div>

            <div style="display: flex; gap: 20px; justify-content: center;">
                <button onclick="location.href='mock-tests.html'" class="btn-primary"
                    style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); color: white; padding: 16px 40px;">Exit
                    Session</button>
                <button onclick="location.reload()" class="btn-primary" style="padding: 16px 40px;">Retake Test</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Access Gate
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                alert("Please login to access mock tests!");
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await db.collection('students').doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    if (userData.plan !== 'pro' && userData.plan !== 'ultimate' && user.email !== ADMIN_EMAIL) {
                        alert("Upgrade required!\n\nThis premium content requires a PRO or ULTIMATE plan. Please upgrade to continue.");
                        window.location.href = 'index.html#pricing';
                    }
                }
            } catch (e) {
                console.error("Access verification failed:", e);
            }
        });

        // State
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {}; // index -> option (A, B, C, D)
        let reviewMarks = new Set();
        let timeRemaining = 3600;
        let timerInterval;
        let marksPerQuestion = 1;
        let negativeMarkPerWrong = 0.25;
        let negativePercent = 25;

        function formatMark(value) {
            const numeric = Number(value);
            if (!Number.isFinite(numeric)) return '0';
            return numeric.toFixed(4).replace(/\.?0+$/, '');
        }

        // Parse test details
        const params = new URLSearchParams(window.location.search);
        const testId = params.get('testId');

        async function loadTest() {
            if (!testId) {
                alert("No test selected!");
                window.location.href = 'mock-tests.html';
                return;
            }

            try {
                // Fetch test metadata
                const testDoc = await db.collection('tests').doc(testId).get();
                if (!testDoc.exists) {
                    alert("Test not found!");
                    window.location.href = 'mock-tests.html';
                    return;
                }
                const testData = testDoc.data();
                document.getElementById('subject-label').textContent = testData.title || 'Mock Test';
                timeRemaining = (testData.duration || 60) * 60;

                const configuredPositive = Number(testData.positiveMark);
                marksPerQuestion = Number.isFinite(configuredPositive) && configuredPositive > 0 ? configuredPositive : 1;

                const configuredNegativeMark = Number(testData.negativeMark);
                const configuredNegativePercent = Number(testData.negativePercent);
                if (Number.isFinite(configuredNegativeMark) && configuredNegativeMark >= 0) {
                    negativeMarkPerWrong = configuredNegativeMark;
                } else {
                    const safePercent = Number.isFinite(configuredNegativePercent) && configuredNegativePercent >= 0
                        ? configuredNegativePercent
                        : 25;
                    negativeMarkPerWrong = Number((marksPerQuestion * (safePercent / 100)).toFixed(4));
                }

                negativePercent = Number.isFinite(configuredNegativePercent) && configuredNegativePercent >= 0
                    ? configuredNegativePercent
                    : (marksPerQuestion > 0 ? Number(((negativeMarkPerWrong / marksPerQuestion) * 100).toFixed(2)) : 0);

                const pointsEl = document.getElementById('question-points');
                if (pointsEl) {
                    pointsEl.textContent = `Points: +${formatMark(marksPerQuestion)} / -${formatMark(negativeMarkPerWrong)}`;
                    pointsEl.title = `Negative marking: ${formatMark(negativePercent)}%`;
                }
                startTimer();

                // Fetch questions
                const qSnap = await db.collection('tests').doc(testId).collection('questions').orderBy('createdAt', 'asc').get();
                qSnap.forEach(doc => {
                    questions.push({ id: doc.id, ...doc.data() });
                });

                if (questions.length === 0) {
                    document.getElementById('q-text').textContent = "This test currently has no questions. Please contact the administrator.";
                    document.getElementById('q-header-text').textContent = "Empty Test";
                    return;
                }

                initNavGrid();
                renderQuestion(0);
                updateProgress();

            } catch (e) {
                console.error("Error loading test:", e);
                document.getElementById('q-text').textContent = "Error loading test data. Please check your connection.";
            }
        }

        function initNavGrid() {
            const container = document.getElementById('q-nav-container');
            container.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'nav-btn';
                btn.id = `nav-btn-${i}`;
                btn.textContent = i + 1;
                btn.onclick = () => renderQuestion(i);
                container.appendChild(btn);
            }
        }

        function renderQuestion(index) {
            if (index < 0 || index >= questions.length) return;
            currentQuestionIndex = index;
            const q = questions[index];

            document.getElementById('q-header-text').textContent = `Question ${index + 1} of ${questions.length}`;
            document.getElementById('q-text').textContent = q.text;

            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';

            const optionKeys = ['A', 'B', 'C', 'D'];
            optionKeys.forEach(opt => {
                if (!q.options[opt]) return;
                const div = document.createElement('div');
                div.className = `option-item ${userAnswers[index] === opt ? 'selected' : ''}`;
                div.onclick = () => selectOption(index, opt, div);
                div.innerHTML = `
                    <span class="option-marker">${opt}</span>
                    ${q.options[opt]}
                `;
                optsContainer.appendChild(div);
            });

            updateNavHighlight();
        }

        window.selectOption = function (qIndex, opt, el) {
            userAnswers[qIndex] = opt;
            // Update UI for current options
            document.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');

            // Mark nav button as answered
            const navBtn = document.getElementById(`nav-btn-${qIndex}`);
            if (navBtn) navBtn.classList.add('answered');
            if (reviewMarks.has(qIndex)) {
                reviewMarks.delete(qIndex);
                navBtn.style.boxShadow = '';
                navBtn.style.background = '';
                navBtn.style.color = '';
            }

            updateProgress();
        }

        window.nextQuestion = function () {
            if (currentQuestionIndex < questions.length - 1) {
                renderQuestion(currentQuestionIndex + 1);
            } else {
                alert('You have reached the last question. Review your answers or submit the test.');
            }
        }

        window.prevQuestion = function () {
            if (currentQuestionIndex > 0) {
                renderQuestion(currentQuestionIndex - 1);
            }
        }

        window.markForReview = function () {
            reviewMarks.add(currentQuestionIndex);
            const navBtn = document.getElementById(`nav-btn-${currentQuestionIndex}`);
            if (navBtn) {
                navBtn.style.boxShadow = 'inset 0 0 15px rgba(245, 158, 11, 0.2)';
                navBtn.style.background = 'rgba(245, 158, 11, 0.15)';
                navBtn.style.color = '#fbbf24';
            }
            nextQuestion();
        }

        function updateNavHighlight() {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const currentBtn = document.getElementById(`nav-btn-${currentQuestionIndex}`);
            if (currentBtn) currentBtn.classList.add('active');
        }

        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).length;
            const total = questions.length;
            document.getElementById('progress-text').textContent = `${answeredCount} / ${total} Answered`;
            document.getElementById('progress-fill').style.width = total > 0 ? `${(answeredCount / total) * 100}%` : '0%';
        }

        window.submitTest = function () {
            if (confirm('Are you sure you want to finalize and submit your test?')) {
                clearInterval(timerInterval);

                // Calculate score
                let score = 0;
                let correctCount = 0;
                let wrongCount = 0;
                let unattempted = 0;

                questions.forEach((q, idx) => {
                    const ans = userAnswers[idx];
                    if (!ans) {
                        unattempted++;
                    } else if (ans === q.correct) {
                        correctCount++;
                        score += marksPerQuestion;
                    } else {
                        wrongCount++;
                        score -= negativeMarkPerWrong;
                    }
                });

                const attempted = correctCount + wrongCount;
                const accuracy = attempted > 0 ? Math.round((correctCount / attempted) * 100) : 0;

                // Populate Result Overlay
                document.getElementById('res-score').textContent = score.toFixed(2);
                document.getElementById('res-correct').textContent = correctCount;
                document.getElementById('res-wrong').textContent = wrongCount;
                document.getElementById('res-accuracy').textContent = accuracy + '%';

                document.getElementById('result-overlay').style.display = 'flex';

                // Hide main content
                document.querySelector('.test-layout').style.filter = 'blur(10px)';
                document.getElementById('session-nav').style.filter = 'blur(10px)';
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up! Submitting test automatically.");
                    submitTest();
                    return;
                }
                timeRemaining--;
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                document.getElementById('clock').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);
        }

        // Wait for auth before starting
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                alert("Please login to access mock tests!");
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await db.collection('students').doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    if (userData.plan !== 'pro' && userData.plan !== 'ultimate' && user.email !== ADMIN_EMAIL) {
                        alert("Upgrade required!\n\nThis premium content requires a PRO or ULTIMATE plan. Please upgrade to continue.");
                        window.location.href = 'index.html#pricing';
                        return;
                    }
                }

                // User approved, load the test
                loadTest();

            } catch (e) {
                console.error("Access verification failed:", e);
                alert("Error verifying access. Please login again.");
                window.location.href = 'index.html';
            }
        });
    </script>

</body>

</html>
