<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Materials | Gov Learn - Expert Notes & PDFs</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/materials.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav id="main-nav"></nav>

    <header class="hero" style="padding: 140px 0 80px; position: relative; overflow: hidden;">
        <div class="div-glow hero-glow-pulse"
            style="position: absolute; top: -100px; left: 50%; width: 600px; height: 300px; background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%); filter: blur(60px); z-index: -1;">
        </div>
        <div class="container text-center" style="position: relative; z-index: 10;">
            <h1 class="hero-title"
                style="font-size: 3.5rem; font-weight: 700; margin-bottom: 20px; line-height: 1.2; color: var(--secondary); opacity: 0; animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                Expert <span>Study Materials</span></h1>
        </div>
    </header>

    <div class="container" style="margin-top: -40px; position: relative; z-index: 20;">
        <div class="premium-lead text-center fade-in" style="margin-bottom: 24px;">
            <p
                style="font-size: 1.05rem; color: var(--text-muted); line-height: 1.6; max-width: 800px; margin: 0 auto; animation: reveal-lead 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
                Download premium PDFs and access interactive web notes curated by experts.
            </p>
        </div>
    </div>

    <section class="subjects-section" style="min-height: 600px; padding: 40px 0 60px;">
        <div class="container">
            <!-- Subject Filters -->
            <div class="mat-tabs zoom-in" style="animation-delay: 0.3s;">
                <div class="mat-tab active" onclick="filterMats('all')">All Subjects</div>
                <div class="mat-tab" onclick="filterMats('Tamil')">Tamil</div>
                <div class="mat-tab" onclick="filterMats('English')">English</div>
                <div class="mat-tab" onclick="filterMats('Maths')">Maths</div>
                <div class="mat-tab" onclick="filterMats('Reasoning')">Reasoning</div>
                <div class="mat-tab" onclick="filterMats('History')">History</div>
                <div class="mat-tab" onclick="filterMats('Polity')">Polity</div>
                <div class="mat-tab" onclick="filterMats('Science')">Science</div>
            </div>

            <div class="search-wrapper fade-in"
                style="margin-bottom: 80px; position:relative; z-index:10; max-width: 800px; margin-left: auto; margin-right: auto;">
                <div class="search-container" style="position: relative;">
                    <i class="fas fa-search"
                        style="position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem; z-index: 5;"></i>
                    <input type="text" id="materials-search" placeholder="Search for notes (e.g. Fundamental Rights)..."
                        style="width: 100%; padding: 22px 22px 22px 64px; border-radius: 20px; color: var(--secondary); font-size: 1.1rem; outline: none; transition: all 0.3s;"
                        onkeyup="searchMaterials()">
                </div>
            </div>

            <div id="materials-container">
                <div id="materials-loading" style="text-align: center; padding: 60px 20px;">
                    <div
                        style="display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(16, 185, 129, 0.2); border-top-color: var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite;">
                    </div>
                    <p style="color: rgba(255, 255, 255, 0.8); margin-top: 16px; font-weight: 600;">Fetching study
                        materials...
                    </p>
                </div>
            </div>
        </div>
    </section>

    <footer id="main-footer"></footer>

    <!-- Modals same as before... -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/mock-data.js"></script>
    <script src="../js/components-loader.js"></script>
    <script src="../js/main.js"></script>

    <script>
        let currentMatFilter = 'all';

        function filterMats(cat) {
            currentMatFilter = cat;
            document.querySelectorAll('.mat-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            fetchAndRenderMaterials(document.getElementById('materials-search').value, currentMatFilter);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('materials-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    fetchAndRenderMaterials(e.target.value, currentMatFilter);
                });
            }
        });
    </script>
</body>

</html>
